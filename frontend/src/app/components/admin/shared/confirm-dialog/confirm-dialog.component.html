<div class="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-black/90 backdrop-blur-md">
    <div class="bg-luxury-charcoal border border-white/10 rounded-[32px] p-8 max-w-md w-full shadow-2xl">
        <!-- Icon -->
        <div class="flex justify-center mb-6">
            @if (options().danger) {
            <div class="w-16 h-16 rounded-full bg-red-500/10 border border-red-500/20 flex items-center justify-center">
                <svg class="w-8 h-8 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
            </div>
            } @else {
            <div class="w-16 h-16 rounded-full bg-gold/10 border border-gold/20 flex items-center justify-center">
                <svg class="w-8 h-8 text-gold" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </div>
            }
        </div>

        <h3 class="text-xl font-serif font-bold text-white text-center mb-3">{{ options().title }}</h3>
        <p class="text-gray-400 text-sm text-center leading-relaxed mb-8">{{ options().message }}</p>

        <div class="flex gap-4">
            <button type="button" (click)="cancelled.emit()"
                class="flex-1 py-4 border border-white/10 text-white font-sans font-bold text-xs tracking-widest uppercase rounded-xl hover:bg-white/5 transition-all">
                {{ options().cancelLabel || 'Cancelar' }}
            </button>
            <button type="button" (click)="confirmed.emit()"
                [class]="options().danger
                    ? 'flex-1 py-4 bg-red-500 text-white font-sans font-bold text-xs tracking-widest uppercase rounded-xl hover:bg-red-400 transition-all'
                    : 'flex-1 py-4 bg-gold text-black font-sans font-bold text-xs tracking-widest uppercase rounded-xl hover:bg-white transition-all'">
                {{ options().confirmLabel || 'Confirmar' }}
            </button>
        </div>
    </div>
</div>
