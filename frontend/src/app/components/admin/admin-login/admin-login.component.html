<section class="min-h-screen bg-luxury-black flex items-center justify-center p-4 relative overflow-hidden">
    <!-- Background Glow -->
    <div
        class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-gold/5 rounded-full blur-[150px]">
    </div>

    <div class="max-w-md w-full relative z-10">
        <div class="glass-dark rounded-[40px] p-10 md:p-12 border border-white/10 shadow-2xl">
            <div class="text-center mb-12">
                <span class="text-2xl font-serif font-bold tracking-tighter uppercase block mb-4">
                    The <span class="text-gold">Silkadelics</span>
                </span>
                <h2 class="text-gold font-sans font-bold tracking-[0.2em] uppercase text-[10px] mb-2">Backoffice</h2>
                <h3 class="text-2xl font-serif font-bold text-white">Acesso Restrito</h3>
            </div>

            <form (ngSubmit)="onLogin()" class="space-y-8">
                <div class="group">
                    <label
                        class="block text-[10px] font-sans font-bold text-gray-500 uppercase tracking-[0.2em] mb-3 group-focus-within:text-gold transition-colors">
                        Email
                    </label>
                    <input type="email" [(ngModel)]="email" name="email" required
                        class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 text-white focus:border-gold focus:bg-white/10 transition-all outline-none font-sans font-light">
                </div>

                <div class="group">
                    <label
                        class="block text-[10px] font-sans font-bold text-gray-500 uppercase tracking-[0.2em] mb-3 group-focus-within:text-gold transition-colors">
                        Palavra-passe
                    </label>
                    <input type="password" [(ngModel)]="password" name="password" required
                        class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 text-white focus:border-gold focus:bg-white/10 transition-all outline-none font-sans font-light">
                </div>

                @if (error) {
                <div
                    class="p-4 bg-red-500/10 border border-red-500/30 rounded-xl text-red-400 text-xs text-center animate-fade-up">
                    {{ error }}
                </div>
                }

                <button type="submit" [disabled]="loading"
                    class="group relative w-full py-5 bg-gold text-black font-sans font-bold text-xs tracking-[0.3em] uppercase rounded-2xl overflow-hidden transition-all disabled:opacity-30">
                    <span class="relative z-10">
                        @if (!loading) {
                        Entrar
                        } @else {
                        <span class="flex items-center justify-center gap-3">
                            <svg class="animate-spin h-4 w-4 text-black" xmlns="http://www.w3.org/2000/svg" fill="none"
                                viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor"
                                    stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor"
                                    d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                                </path>
                            </svg>
                            Autenticando...
                        </span>
                        }
                    </span>
                    <div
                        class="absolute inset-0 bg-white transform scale-x-0 group-hover:scale-x-100 transition-transform origin-left duration-500 ease-out">
                    </div>
                </button>
            </form>

            <div class="mt-10 text-center">
                <a href="/"
                    class="text-[10px] font-sans font-bold text-gray-500 uppercase tracking-[0.2em] hover:text-gold transition-colors">
                    Voltar ao site
                </a>
            </div>
        </div>
    </div>
</section>
