<nav class="fixed top-0 left-0 w-full z-50 transition-all duration-500 border-b border-white/5"
    [class.bg-black_80]="!isMenuOpen" [class.backdrop-blur-md]="!isMenuOpen" [class.bg-black]="isMenuOpen">

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-24 items-center">
            <!-- Logo -->
            <div class="flex-shrink-0 flex items-center group cursor-pointer" (click)="scrollToTop()">
                <img src="assets/images/logo.png" alt="Silkadelics"
                    class="h-16 w-auto object-contain transition-transform duration-500 group-hover:scale-110 drop-shadow-[0_0_8px_rgba(255,45,149,0.5)]">
            </div>

            <!-- Desktop Menu -->
            <div class="hidden md:flex space-x-10 items-center">
                <a href="#about"
                    class="text-xs font-sans font-bold tracking-widest text-gray-300 hover:text-gold transition-colors uppercase">Sobre</a>
                <a href="#events"
                    class="text-xs font-sans font-bold tracking-widest text-gray-300 hover:text-gold transition-colors uppercase">Eventos</a>
                <a href="#packs"
                    class="text-xs font-sans font-bold tracking-widest text-gray-300 hover:text-gold transition-colors uppercase">Packs</a>
                <a href="#gallery"
                    class="text-xs font-sans font-bold tracking-widest text-gray-300 hover:text-gold transition-colors uppercase">Galeria</a>

                <a href="#booking"
                    class="px-8 py-3 bg-white/5 border border-white/10 text-gold text-xs font-bold tracking-widest uppercase hover:bg-gold hover:text-black hover:border-gold transition-all duration-300">
                    Reservar
                </a>

                <!-- Language Switcher -->
                <div class="flex items-center space-x-3 border-l pl-8 border-white/10">
                    <button (click)="setLanguage('pt')" [class.text-white]="langService.getLanguage() === 'pt'"
                        [class.text-gray-600]="langService.getLanguage() !== 'pt'"
                        class="text-xs font-bold hover:text-gold transition-colors">PT</button>
                    <span class="text-gray-700 text-xs">/</span>
                    <button (click)="setLanguage('en')" [class.text-white]="langService.getLanguage() === 'en'"
                        [class.text-gray-600]="langService.getLanguage() !== 'en'"
                        class="text-xs font-bold hover:text-gold transition-colors">EN</button>
                </div>
            </div>

            <!-- Mobile Menu Button -->
            <div class="md:hidden flex items-center space-x-6">
                <button (click)="toggleMenu()" class="text-white hover:text-gold transition-colors focus:outline-none">
                    <svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        @if (!isMenuOpen) {
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 8h16M4 16h16" />
                        } @else {
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                            d="M6 18L18 6M6 6l12 12" />
                        }
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Mobile Menu -->
    @if (isMenuOpen) {
    <div class="md:hidden bg-black border-t border-white/10 h-screen animate-fade-in">
        <div class="flex flex-col items-center justify-center h-[80vh] space-y-8">
            <a href="#about" (click)="toggleMenu()"
                class="text-2xl font-serif text-white hover:text-gold transition-colors">Sobre</a>
            <a href="#events" (click)="toggleMenu()"
                class="text-2xl font-serif text-white hover:text-gold transition-colors">Eventos</a>
            <a href="#packs" (click)="toggleMenu()"
                class="text-2xl font-serif text-white hover:text-gold transition-colors">Packs</a>
            <a href="#gallery" (click)="toggleMenu()"
                class="text-2xl font-serif text-white hover:text-gold transition-colors">Galeria</a>
            <a href="#booking" (click)="toggleMenu()" class="text-2xl font-serif text-gold font-bold">Reservar Agora</a>

            <div class="flex space-x-6 mt-8">
                <button (click)="setLanguage('pt')"
                    class="text-sm font-bold tracking-widest uppercase text-white hover:text-gold">PT</button>
                <button (click)="setLanguage('en')"
                    class="text-sm font-bold tracking-widest uppercase text-white hover:text-gold">EN</button>
            </div>
        </div>
    </div>
    }
</nav>
