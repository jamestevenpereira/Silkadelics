<section class="relative h-screen w-full overflow-hidden">
    <!-- Video Background -->
    <div class="absolute inset-0 z-0">
        <div class="absolute inset-0 bg-black/60 z-10"></div>
        <!-- Poster Image (shown until video loads) -->
        <img
            [src]="posterUrl()"
            fetchpriority="high"
            class="poster-image absolute inset-0 w-full h-full object-cover"
            [class.hidden]="!posterShown"
            alt="Silkadelics Live Band">
        <div 
            class="absolute inset-0 bg-black/60 z-[5]"
            [class.hidden]="!posterShown"></div>
        <!-- YouTube IFrame Container -->
        <div id="hero-video" class="w-full h-full scale-150 pointer-events-none"></div>
    </div>

    <!-- Play Overlay (shown when poster visible) -->
    @if (posterShown) {
    <div class="absolute inset-0 z-25 flex items-center justify-center cursor-pointer" (click)="loadVideo()">
        <div
            class="w-20 h-20 rounded-full bg-white/10 backdrop-blur-md border border-white/30 flex items-center justify-center text-white hover:bg-primary/80 hover:border-primary transition-all duration-500 group">
            <svg class="w-8 h-8 ml-1" fill="currentColor" viewBox="0 0 24 24">
                <path d="M8 5v14l11-7z" />
            </svg>
        </div>
    </div>
    }

    <!-- Content -->
    <div class="relative z-20 h-full flex flex-col items-center justify-center text-center px-4 sm:px-6 lg:px-8">
        <h1 class="text-5xl md:text-8xl font-serif font-bold text-white mb-6 animate-fade-up neon-text">
            {{ content().hero?.headline }}
        </h1>
        <p class="text-lg md:text-2xl text-gray-300 font-sans font-light max-w-3xl mb-12 animate-fade-up delay-200">
            {{ content().hero?.subheadline }}
        </p>
        <div class="flex flex-col sm:flex-row gap-6 animate-fade-up delay-500">
            <a href="#booking"
                class="px-12 py-5 bg-primary text-white font-sans font-bold text-xs tracking-[0.3em] uppercase rounded-xl hover:bg-white hover:text-black transition-all duration-300 shadow-[0_0_20px_rgba(255,45,149,0.5)]">
                {{ content().hero?.ctaPrimary }}
            </a>
            <a href="#packs"
                class="px-12 py-5 border border-secondary text-secondary font-sans font-bold text-xs tracking-[0.3em] uppercase rounded-xl hover:bg-secondary hover:text-black transition-all duration-300 shadow-[0_0_15px_rgba(0,243,255,0.3)]">
                {{ content().hero?.ctaSecondary }}
            </a>
        </div>
    </div>

    <!-- Audio Toggle Button -->
    <div class="absolute bottom-10 right-10 z-30 animate-fade-up delay-700">
        <button (click)="toggleAudio()"
            [attr.aria-label]="isMuted() ? (langService.getLanguage() === 'pt' ? 'Ligar Áudio' : 'Unmute') : (langService.getLanguage() === 'pt' ? 'Desligar Áudio' : 'Mute')"
            class="group relative w-16 h-16 bg-white/10 backdrop-blur-md border border-white/20 rounded-full flex items-center justify-center text-white hover:bg-gold hover:text-black transition-all duration-500 shadow-2xl overflow-hidden focus:ring-2 focus:ring-white/50 focus:outline-none">

            <div
                class="absolute inset-0 bg-gold transform scale-y-0 group-hover:scale-y-100 transition-transform origin-bottom duration-500 ease-out">
            </div>

            <div class="relative z-10 flex items-center justify-center">
                @if (isMuted()) {
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2" />
                </svg>
                } @else {
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                </svg>
                }
            </div>
        </button>
    </div>

    <!-- Scroll Indicator -->
    <div class="absolute bottom-10 left-1/2 -translate-x-1/2 z-20 animate-bounce">
        <div class="w-[1px] h-20 bg-gradient-to-b from-transparent via-primary to-transparent"></div>
    </div>
</section>
