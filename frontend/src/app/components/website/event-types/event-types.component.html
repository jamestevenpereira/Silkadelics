<section class="pb-28 bg-luxury-black relative overflow-hidden">
    <!-- Background Texture -->
    <div
        class="absolute inset-0 opacity-[0.03] pointer-events-none bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')]">
    </div>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
        <div class="text-center mb-20">
            <h2 class="text-primary font-sans font-bold tracking-[0.2em] uppercase text-xs mb-4 animate-fade-up">
                {{ content().eventTypes.title }}
            </h2>
            <h3 class="text-4xl md:text-5xl font-serif font-bold text-white animate-fade-up delay-200">
                {{ content().eventTypes.subtitle }}
            </h3>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-10">
            @for (type of content().eventTypes.items; track type.title) {
            <a href="#booking"
                class="group relative p-12 rounded-3xl border border-white/5 bg-white/5 backdrop-blur-sm hover:border-primary/30 transition-all duration-700 overflow-hidden block">
                <!-- Hover Background Glow -->
                <div
                    class="absolute -inset-1 bg-gradient-to-r from-primary/0 via-primary/10 to-primary/0 opacity-0 group-hover:opacity-100 transition-opacity duration-700 blur-xl">
                </div>

                <div class="relative z-10">
                    <div
                        class="w-16 h-16 bg-primary/10 rounded-2xl flex items-center justify-center mb-10 group-hover:bg-primary transition-all duration-500 transform group-hover:rotate-6">
                        <svg class="w-8 h-8 text-primary group-hover:text-black transition-colors duration-500"
                            fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z" />
                        </svg>
                    </div>

                    <h4
                        class="text-2xl font-serif font-bold text-white mb-6 group-hover:text-primary transition-colors">
                        {{ type.title }}
                    </h4>
                    <p
                        class="text-gray-400 font-sans font-light leading-relaxed group-hover:text-gray-300 transition-colors">
                        {{ type.description }}
                    </p>

                    <div
                        class="mt-10 flex items-center gap-2 text-primary text-xs font-bold tracking-widest uppercase opacity-0 group-hover:opacity-100 transition-all duration-500 translate-y-4 group-hover:translate-y-0">
                        {{ content().eventTypes.requestQuote }}
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M17 8l4 4m0 0l-4 4m4-4H3" />
                        </svg>
                    </div>
                </div>
            </a>
            }
        </div>
    </div>
</section>
