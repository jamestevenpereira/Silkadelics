@if (isVisible()) {
<button
  (click)="scrollToTop()"
  aria-label="Voltar ao topo"
  class="fixed bottom-8 right-8 z-[100] w-12 h-12 bg-white/10 backdrop-blur-md border border-white/20 rounded-full flex items-center justify-center text-white hover:bg-primary hover:border-primary transition-all duration-300 shadow-2xl focus:outline-none focus:ring-2 focus:ring-primary/50 animate-fade-up">
  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7" />
  </svg>
</button>
}
